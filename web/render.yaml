services:
  - type: web
    name: matcher-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # preDeployCommand requires a paid plan; Docker free tier runs migrations in start.js
    preDeployCommand: npx prisma migrate deploy
    startCommand: node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADSENSE_PUBLISHER_ID
        sync: false
      - key: DATABASE_URL
        sync: false

